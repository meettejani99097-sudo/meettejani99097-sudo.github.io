<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Blitz Choco – Multiplayer Puzzle Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0a0005;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Full-screen background image ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('block-blitz-choco-bg.png') center center / cover no-repeat;
      z-index: 0;
    }

    /* Subtle dark vignette so button pops */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    }

    /* ── Floating download button ── */
    .cta-wrap {
      position: relative;
      z-index: 10;
      /* push it toward the bottom-centre, over the START GAME area */
      margin-top: 72vh;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
      background: linear-gradient(135deg, #2ecc40 0%, #27ae60 60%, #1a7a42 100%);
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.25),
        0 6px 28px rgba(39,174,96,0.65),
        0 2px 6px rgba(0,0,0,0.5);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    /* shine sweep */
    .download-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 50%;
      height: 200%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-20deg);
      animation: shine 2.8s infinite;
    }

    @keyframes shine {
      0%   { left: -60%; }
      40%  { left: 130%; }
      100% { left: 130%; }
    }

    .download-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.35),
        0 10px 38px rgba(39,174,96,0.8),
        0 4px 10px rgba(0,0,0,0.55);
      filter: brightness(1.08);
    }

    .download-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Google Play icon */
    .play-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    /* pulse ring */
    .ring {
      position: absolute;
      inset: -6px;
      border-radius: 60px;
      border: 3px solid rgba(46,204,64,0.5);
      animation: pulse-ring 2s ease-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(1.14); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="cta-wrap">
    <a
      class="download-btn"
      href="https://play.google.com/store/apps/details?id=com.choco.blockblitz"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div class="ring"></div>

      <!-- Google Play SVG icon -->
      <svg class="play-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3.18 23.76c.3.17.65.2.98.08L14.5 12 3.18.16A1.1 1.1 0 0 0 3 .76v22.48c0 .21.06.39.18.52z" fill="#fff"/>
        <path d="M18.31 15.58 14.5 12l3.81-3.58 4.31 2.49a1.1 1.1 0 0 1 0 1.94l-4.31 2.73z" fill="#fff" opacity=".85"/>
        <path d="M14.5 12 3.18 23.84c.15.06.31.08.47.04L18.31 15.58 14.5 12z" fill="#fff" opacity=".7"/>
        <path d="M14.5 12 3.65.12A.54.54 0 0 0 3.18.16L14.5 12z" fill="#fff" opacity=".7"/>
      </svg>

      Download on Google Play
    </a>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Blitz Choco – Play Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #f5c518;
      --gold2: #ff9d00;
      --red: #ff3b3b;
      --green: #00e676;
      --dark: #0d0008;
      --glow-gold: rgba(245,197,24,0.7);
      --glow-green: rgba(0,230,118,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      cursor: none;
    }

    /* ─── CUSTOM CURSOR ─── */
    .cursor {
      width: 18px; height: 18px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor-dot {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* ─── BACKGROUND ─── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('block-blitz-choco-bg.png') center center / cover no-repeat;
    }

    /* gradient overlays for drama */
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 30%, transparent 55%, rgba(0,0,0,0.9) 100%);
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(13,0,8,0.6) 100%);
    }

    /* ─── FLOATING PARTICLES ─── */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* ─── TOP BADGE ─── */
    .top-badge {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(245,197,24,0.4);
      backdrop-filter: blur(12px);
      padding: 8px 22px;
      border-radius: 50px;
      animation: fade-drop 0.8s ease forwards;
      opacity: 0;
    }
    @keyframes fade-drop {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .top-badge .dot {
      width: 8px; height: 8px; background: var(--green);
      border-radius: 50%; animation: blink 1.4s infinite;
      box-shadow: 0 0 8px var(--green);
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .top-badge span {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.85);
    }

    /* ─── MAIN CONTENT WRAP ─── */
    .content {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 52px;
    }

    /* ─── TITLE BLOCK ─── */
    .title-block {
      text-align: center;
      margin-bottom: 10px;
      animation: rise 0.9s 0.3s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(40px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .title-block .game-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.8rem);
      line-height: 1;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ffe066 0%, #ff9d00 50%, #ff4e00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 22px rgba(255,180,0,0.55));
    }
    .title-block .tagline {
      font-size: clamp(0.78rem, 2.2vw, 1rem);
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ─── STATS ROW ─── */
    .stats {
      display: flex; gap: 28px;
      margin-bottom: 28px;
      animation: rise 0.9s 0.5s cubic-bezier(.22,1,.36,1) both;
    }
    .stat {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 10px 20px;
      min-width: 80px;
    }
    .stat .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem;
      color: var(--gold);
      line-height: 1;
      filter: drop-shadow(0 0 6px var(--glow-gold));
    }
    .stat .lbl {
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* ─── DOWNLOAD BUTTON ─── */
    .btn-wrap {
      position: relative;
      animation: rise 0.9s 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    /* outer glow rings */
    .btn-wrap::before, .btn-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 60px;
      border: 2px solid rgba(0,230,118,0.35);
      animation: pulse-out 2.2s ease-out infinite;
    }
    .btn-wrap::after {
      inset: -20px;
      border-color: rgba(0,230,118,0.15);
      animation-delay: 0.5s;
    }
    @keyframes pulse-out {
      0%   { transform: scale(1);    opacity: 1; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .download-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 14px;
      padding: 17px 40px 17px 30px;
      border-radius: 55px;
      text-decoration: none;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.25);

      /* layered background */
      background:
        linear-gradient(135deg, #00c853 0%, #00e676 40%, #69f0ae 100%);
      box-shadow:
        0 0 0 0 rgba(0,230,118,0),
        0 8px 32px rgba(0,200,83,0.55),
        inset 0 1px 0 rgba(255,255,255,0.3);

      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    /* shine sweep */
    .download-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-18deg);
      animation: sweep 2.6s 1.5s infinite;
    }
    @keyframes sweep {
      0%   { left: -75%; }
      45%  { left: 130%; }
      100% { left: 130%; }
    }

    .download-btn:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow:
        0 14px 42px rgba(0,200,83,0.75),
        inset 0 1px 0 rgba(255,255,255,0.35);
      filter: brightness(1.1);
    }
    .download-btn:active {
      transform: scale(0.97);
    }

    .play-icon {
      width: 32px; height: 32px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      position: relative; z-index: 1;
    }

    .btn-text { position: relative; z-index: 1; }
    .btn-text .line1 {
      display: block;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(0,50,20,0.85);
      line-height: 1;
    }
    .btn-text .line2 {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem; letter-spacing: 1.5px;
      color: #003314;
      line-height: 1.1;
    }

    /* ─── BOTTOM NOTE ─── */
    .bottom-note {
      margin-top: 16px;
      display: flex; align-items: center; gap: 8px;
      animation: rise 0.9s 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    .bottom-note .stars { color: var(--gold); font-size: 0.85rem; letter-spacing: 2px; }
    .bottom-note span { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 600; letter-spacing: 1px; }

    /* ─── CORNER DECOR ─── */
    .corner {
      position: fixed; z-index: 5; pointer-events: none;
      width: 90px; height: 90px;
      opacity: 0.35;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 0; left: 0; }
    .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner.br { bottom: 0; right: 0; transform: scale(-1); }

    /* scanline overlay */
    .scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
    }
  </style>
</head>
<body>

  <!-- cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <!-- background -->
  <div class="bg"></div>
  <div class="scanlines"></div>

  <!-- particles container -->
  <div class="particles" id="particles"></div>

  <!-- corner decors -->
  <div class="corner tl">
    <svg viewBox="0 0 90 90" fill="none">
      <path d="M0 0 L90 0 L0 90 Z" fill="url(#cg)"/>
      <defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#f5c518"/>
        <stop offset="100%" stop-color="transparent"/>
      </linearGradient></defs>
    </svg>
  </div>
  <div class="corner tr"><svg viewBox="0 0 90 90" fill="none"><path d="M0 0 L90 0 L0 90 Z" fill="url(#cg2)"/><defs><linearGradient id="cg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c518"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg></div>
  <div class="corner bl"><svg viewBox="0 0 90 90" fill="none"><path d="M0 0 L90 0 L0 90 Z" fill="url(#cg3)"/><defs><linearGradient id="cg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c518"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg></div>
  <div class="corner br"><svg viewBox="0 0 90 90" fill="none"><path d="M0 0 L90 0 L0 90 Z" fill="url(#cg4)"/><defs><linearGradient id="cg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c518"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs></svg></div>

  <!-- top badge -->
  <div class="top-badge">
    <div class="dot"></div>
    <span>Multiplayer &nbsp;·&nbsp; Online &nbsp;·&nbsp; Free</span>
  </div>

  <!-- main content -->
  <div class="content">
    <div class="title-block">
      <div class="game-name">Block Blitz Choco</div>
      <div class="tagline">Challenge. Compete. Conquer.</div>
    </div>

    <div class="stats">
      <div class="stat"><span class="val">1M+</span><span class="lbl">Players</span></div>
      <div class="stat"><span class="val">4.8★</span><span class="lbl">Rating</span></div>
      <div class="stat"><span class="val">FREE</span><span class="lbl">To Play</span></div>
    </div>

    <div class="btn-wrap">
      <a class="download-btn"
         href="https://play.google.com/store/apps/details?id=com.choco.blockblitz"
         target="_blank" rel="noopener noreferrer">
        <img class="play-icon" src="playstore-icon.png" alt="Google Play"/>
        <div class="btn-text">
          <span class="line1">Get it on</span>
          <span class="line2">Google Play</span>
        </div>
      </a>
    </div>

    <div class="bottom-note">
      <span class="stars">★★★★★</span>
      <span>50,000+ Reviews &nbsp;·&nbsp; Android</span>
    </div>
  </div>

  <script>
    // ── Custom cursor
    const cursor = document.getElementById('cursor');
    const dot    = document.getElementById('cursorDot');
    let mx = 0, my = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function loop() {
      cx += (mx - cx) * 0.15;
      cy += (my - cy) * 0.15;
      cursor.style.left = cx + 'px';
      cursor.style.top  = cy + 'px';
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';
      requestAnimationFrame(loop);
    })();

    // ── Particles
    const container = document.getElementById('particles');
    const colors = ['#f5c518','#ff9d00','#00e676','#ff3b3b','#ffffff'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${6 + Math.random()*10}s;
        animation-delay:${Math.random()*8}s;
        filter: blur(${Math.random()*1.5}px);
        box-shadow: 0 0 ${size*2}px currentColor;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
